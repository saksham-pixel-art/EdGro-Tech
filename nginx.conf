server {
    listen 443 ssl http2;
    server_name edgrotech.com www.edgrotech.com;

    # SSL Configuration (Let's Encrypt / Cloudflare Origin)
    ssl_certificate /etc/letsencrypt/live/edgrotech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edgrotech.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # OWASP Recommended Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always; # Prevents Clickjacking
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.edgrotech.com; img-src 'self' data: https:; script-src 'self' 'unsafe-inline';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=2r/s;

    # Proxy to Spring Boot Backend API
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=5 nodelay; # Stricter limit for auth to prevent brute force
        proxy_pass http://localhost:8080/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header X-Powered-By;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://localhost:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header X-Powered-By;
    }

    # Serve React Frontend
    location / {
        root /var/www/edgrotech/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

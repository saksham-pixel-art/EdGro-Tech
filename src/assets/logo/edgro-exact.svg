<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0B86A"/>
      <stop offset="100%" stop-color="#A07828"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8C8C8"/>
      <stop offset="100%" stop-color="#787878"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#383838"/>
      <stop offset="100%" stop-color="#282828"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#282828"/>
      <stop offset="100%" stop-color="#383838"/>
    </linearGradient>
  </defs>

  <!-- ══════════════════════════════════════════════ -->
  <!--  BOOK ICON  (fits in 0,0 → 72,80)             -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- Book pages bottom fan lines -->
  <path d="M4 60 Q36 66 68 60" stroke="url(#g1)" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M5 64 Q36 70 67 64" stroke="url(#g1)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.65"/>
  <path d="M6 68 Q36 74 66 68" stroke="url(#g1)" stroke-width="1"   fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- Left page -->
  <path d="M5 22 Q5 17 10 16 L34 16 L34 60 Q20 57 5 60 Z" fill="url(#g3)"/>
  <!-- Right page -->
  <path d="M67 22 Q67 17 62 16 L38 16 L38 60 Q52 57 67 60 Z" fill="url(#g4)"/>
  <!-- Spine shadow -->
  <line x1="36" y1="15" x2="36" y2="61" stroke="#111" stroke-width="1.5"/>

  <!-- ── E letter (left page, silver) ── -->
  <rect x="9"  y="24" width="4.5" height="28" rx="1" fill="url(#g2)"/>
  <rect x="9"  y="24" width="18"  height="5"  rx="1" fill="url(#g2)"/>
  <rect x="9"  y="35" width="14"  height="4.5" rx="1" fill="url(#g2)"/>
  <rect x="9"  y="47" width="18"  height="5"  rx="1" fill="url(#g2)"/>

  <!-- ── G letter (right page, gold) ── -->
  <path d="
    M64 28 Q64 21 58 19 Q50 16 43 20 Q38 24 38 32
    Q38 41 44 45 Q51 49 58 47 Q64 45 65 40
    L65 33 L54 33 L54 38 L59 38
    Q58 43 53 44 Q46 45 42 40
    Q40 36 41 30 Q42 24 48 22
    Q54 20 58 24 Q62 26 62 30 Z
  " fill="url(#g1)"/>

  <!-- ── Pixel dots (top-right of G) ── -->
  <rect x="56" y="5"  width="5.5" height="5.5" rx="1"   fill="url(#g1)" opacity="0.95"/>
  <rect x="63" y="3"  width="5"   height="5"   rx="0.9" fill="url(#g1)" opacity="0.78"/>
  <rect x="59" y="12" width="5"   height="5"   rx="0.9" fill="url(#g1)" opacity="0.85"/>
  <rect x="66" y="10" width="4.5" height="4.5" rx="0.8" fill="url(#g1)" opacity="0.65"/>
  <rect x="62" y="19" width="4"   height="4"   rx="0.7" fill="url(#g1)" opacity="0.55"/>
  <rect x="68" y="17" width="3.5" height="3.5" rx="0.6" fill="url(#g1)" opacity="0.40"/>

  <!-- ══════════════════════════════════════════════ -->
  <!--  WORDMARK  (x starts at 80)                   -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- "EdGro" in gold — using font -->
  <text x="80" y="50"
    font-family="Poppins, Montserrat, Arial, sans-serif"
    font-size="30" font-weight="700"
    fill="url(#g1)" letter-spacing="-0.5">EdGro</text>

  <!-- "Tech" in silver -->
  <text x="196" y="50"
    font-family="Poppins, Montserrat, Arial, sans-serif"
    font-size="30" font-weight="300"
    fill="url(#g2)" letter-spacing="-0.5"> Tech</text>

  <!-- PRIVATE LIMITED with dashes -->
  <line x1="80"  y1="62" x2="96"  y2="62" stroke="url(#g1)" stroke-width="0.9" opacity="0.6"/>
  <line x1="280" y1="62" x2="296" y2="62" stroke="url(#g1)" stroke-width="0.9" opacity="0.6"/>
  <text x="188" y="66"
    text-anchor="middle"
    font-family="Poppins, Montserrat, Arial, sans-serif"
    font-size="7" font-weight="400"
    fill="#777" letter-spacing="3.5">PRIVATE LIMITED</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Favicon — simplified EG mark, works at 16×16 and 32×32 -->
  <defs>
    <linearGradient id="goldFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8B86A"/>
      <stop offset="100%" stop-color="#C89B3C"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#1F1F1F"/>

  <!-- Book base -->
  <path d="M4 22 Q16 25 28 22 L28 24 Q16 27 4 24 Z" fill="url(#goldFav)"/>

  <!-- Left page -->
  <path d="M5 10 Q5 7 8 6.5 L15.5 6.5 L15.5 22 Q10 20.5 5 22 Z" fill="#2E2E2E"/>

  <!-- Right page -->
  <path d="M27 10 Q27 7 24 6.5 L16.5 6.5 L16.5 22 Q22 20.5 27 22 Z" fill="#383838"/>

  <!-- Spine -->
  <line x1="16" y1="6.5" x2="16" y2="22" stroke="#1A1A1A" stroke-width="1"/>

  <!-- E (simplified for small size) -->
  <rect x="6.5" y="9.5" width="3.5" height="9" rx="0.5" fill="#888888"/>
  <rect x="6.5" y="9.5" width="6.5" height="2" rx="0.5" fill="#888888"/>
  <rect x="6.5" y="13" width="5" height="1.5" rx="0.5" fill="#888888"/>
  <rect x="6.5" y="16.5" width="6.5" height="2" rx="0.5" fill="#888888"/>

  <!-- G (simplified) -->
  <path d="M25.5 11.5 Q25.5 8.5 23 8 Q19.5 7.5 17.5 9.5 Q16 11 16 14 Q16 17 18 18.5 Q20 20 23 19.5 Q25.5 19 26 17 L26 14 L22.5 14 L22.5 15.5 L24.5 15.5 Q24 17.5 22 18 Q19.5 18.5 18 16.5 Q17 15 17.5 12.5 Q18 10 20.5 9.5 Q23 9 24.5 10.5 Q25.5 11 25.5 12 Z" fill="url(#goldFav)"/>

  <!-- Pixel dots (top right) -->
  <rect x="21" y="2.5" width="2" height="2" rx="0.4" fill="url(#goldFav)" opacity="0.9"/>
  <rect x="24" y="2"   width="1.8" height="1.8" rx="0.4" fill="url(#goldFav)" opacity="0.7"/>
  <rect x="27" y="2"   width="1.5" height="1.5" rx="0.3" fill="url(#goldFav)" opacity="0.5"/>
  <rect x="22.5" y="5" width="1.8" height="1.8" rx="0.4" fill="url(#goldFav)" opacity="0.75"/>
  <rect x="25.5" y="4.5" width="1.5" height="1.5" rx="0.3" fill="url(#goldFav)" opacity="0.55"/>
</svg>

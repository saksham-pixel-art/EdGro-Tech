version: "3.9"

services:
  # ── MySQL 8 ────────────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: edgro-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-edgro_dev}
      MYSQL_USER: ${DB_USER:-edgro}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER:-edgro}", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot API ────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edgro-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_USER: ${DB_USER:-edgro}
      DB_PASS: ${DB_PASS}
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${DB_NAME:-edgro_dev}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      GOOGLE_SHEETS_ENABLED: ${GOOGLE_SHEETS_ENABLED:-false}
      GOOGLE_SA_KEY_PATH: /etc/secrets/google-sa.json
      GOOGLE_SHEETS_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID}
      GOOGLE_SHEETS_SHEET_NAME: ${GOOGLE_SHEETS_SHEET_NAME:-Leads}
    volumes:
      - ./secrets/google-sa.json:/etc/secrets/google-sa.json:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend (dev) ───────────────────────────────────
  frontend:
    image: node:22-alpine
    container_name: edgro-frontend
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - api

volumes:
  mysql_data:
